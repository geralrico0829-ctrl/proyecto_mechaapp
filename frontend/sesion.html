<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion Geral</title>
    <link rel="stylesheet" href="sesion.css">
</head>
<body>
        
    <div class="container">
        <div class="container-form">
            <form class="sign-in">
                <h2>Iniciar Sesión</h2>
                <div class="social-networks">
                    <ion-icon name="logo-twitch"></ion-icon>
                    <ion-icon name="logo-twitter"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                    <ion-icon name="logo-tiktok"></ion-icon>
                </div>
                <span>Use su correo y contraseña</span>
                <div class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="text" placeholder="Email">
                </div>
                <div class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="Password">
                </div>
                <a href="#">¿Olvidaste tu contraseña?</a>
                <button class="button" onclick="window.location.href='../index.html'">INICIAR SESIÓN</button>
            </form>
        </div>

        <div class="container-form">
            <form class="sign-up">
                <h2>Registrarse</h2>
                <div class="social-networks">
                    <ion-icon name="logo-twitch"></ion-icon>
                    <ion-icon name="logo-twitter"></ion-icon>
                    <ion-icon name="logo-instagram"></ion-icon>
                    <ion-icon name="logo-tiktok"></ion-icon>
                </div>
                <span>Use su correo electrónico para registrarse</span>
                <div class="container-input">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" placeholder="Nombre">
                </div>
                <div class="container-input">
                    <ion-icon name="mail-outline"></ion-icon>
                    <input type="text" placeholder="Email">
                </div>
                <div class="container-input">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" placeholder="Password">
                </div>
                <button class="button" >REGISTRARSE</button>
            </form>
        </div>

        <div class="container-welcome">
            <div class="welcome-sign-up welcome">
                <h3>¡Bienvenido!</h3>
                <p>Ingrese sus datos personales para usar todas las funciones del sitio</p>
                <button class="button" id="btn-sign-up">Registrarse</button>
            </div>
            <div class="welcome-sign-in welcome">
                <h3>¡Hola!</h3>
                <p>Regístrese con sus datos personales para usar todas las funciones del sitio</p>
                <button class="button" id="btn-sign-in">Iniciar Sesión</button>
            </div>
        </div>

    </div>


    <script src="js/script.js"></script>
        <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <script>
    const API_URL = 'http://localhost:8000/api';
    
    // Manejar inicio de sesión
    document.querySelector('.sign-in').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.querySelector('.sign-in input[placeholder="Email"]').value;
        const password = document.querySelector('.sign-in input[placeholder="Password"]').value;
        
        try {
            const response = await fetch(`${API_URL}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, contrasena: password })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                localStorage.setItem('user_id', data.user_id);
                localStorage.setItem('user_name', data.nombre);
                localStorage.setItem('user_type', data.tipo_usuario);
                
                if (data.tipo_usuario === 'admin') {
                    window.location.href = 'panel.html';
                } else {
                    window.location.href = 'index.html';
                }
            } else {
                alert('Credenciales incorrectas');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al conectar con el servidor');
        }
    });
    
    // Manejar registro
    document.querySelector('.sign-up').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const nombre = document.querySelector('.sign-up input[placeholder="Nombre"]').value;
        const email = document.querySelector('.sign-up input[placeholder="Email"]').value;
        const password = document.querySelector('.sign-up input[placeholder="Password"]').value;
        
        const usuario = {
            nombre: nombre.split(' ')[0] || nombre,
            apellido: nombre.split(' ')[1] || '',
            email: email,
            contrasena: password,
            fecha_nacimiento: '1990-01-01',
            direccion: 'Por definir',
            telefono: '',
            tipo_usuario: 'cliente'
        };
        
        try {
            const response = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(usuario)
            });
            
            if (response.ok) {
                alert('Registro exitoso. Ahora puedes iniciar sesión');
                document.querySelector('.sign-up').reset();
            } else {
                const error = await response.json();
                alert(error.detail || 'Error en el registro');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Error al conectar con el servidor');
        }
    });
</script>

    
</body>
</html>
